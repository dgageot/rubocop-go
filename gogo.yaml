version: "1"

default: dev

tasks:
  # Build, lint, and test on source changes
  dev:
    deps: [build, lint, test]
    sources: go

  # Build the binary
  build:
    cmd: go build -trimpath -ldflags "-s -w" -o bin/rubocop-go .
    sources: go

  # Run linters
  lint:
    cmd: golangci-lint run
    sources: [go, .golangci.yml]

  # Run tests
  test:
    cmd: go test ./...
    sources: go

  # Format Go source files
  format:
    cmd: goimports -w .
    sources: "**/*.go"

  # Remove build artifacts
  clean:
    cmd: rm -rf bin
